aid: kentico
name: Kentico
description: Kentico is an enterprise .NET CMS and digital experience platform offering
  REST and GraphQL APIs for managing web content, e-commerce, digital marketing, and
  personalization. Xperience by Kentico provides headless channel GraphQL endpoints
  auto-generated per channel, a content item .NET API, file storage APIs supporting
  Azure Blob and Amazon S3, and a management REST service for CRUD operations on CMS
  objects. The platform supports ASP.NET Core with channel-based licensing covering
  website, email, and headless channels.
