apis:
- aid: kentico:kentico-headless-graphql-api
  name: Kentico Headless GraphQL API
  description: Auto-generated GraphQL API endpoint for each headless channel in Xperience
    by Kentico. Supports querying content items with filtering, sorting, pagination,
    linked items, language variants, taxonomy tags, assets, and rich text. Authentication
    uses Bearer API key tokens. Interactive schema exploration available via the /graphql/ui
    IDE.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.kentico.com/documentation/developers-and-admins/development/content-retrieval/retrieve-headless-content
  baseURL: https://example.com/graphql
  tags:
