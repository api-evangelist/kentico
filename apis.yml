- aid: kentico:kentico-management-rest-api
  name: Kentico Management REST API
  description: Built-in REST service for reading, creating, updating, and deleting
    pages and CMS objects within Xperience by Kentico. Requests use HTTP Basic authentication
    with Base64-encoded credentials or hash parameter authentication for public endpoints.
    Returns data in XML, JSON, RSS, or Atom format.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.kentico.com/documentation/developers-and-admins/api
  baseURL: https://example.com/rest
