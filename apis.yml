- aid: kentico:kentico-dotnet-content-api
  name: Kentico .NET Content API
  description: Server-side .NET API for content item queries, object queries, file
    system operations, and database access within Xperience by Kentico applications.
    Includes ContentRetriever API, ObjectQuery API, Files API with CMS.IO supporting
    Azure Blob storage and Amazon S3, and code generation tools for system objects.
